<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Consumer Links Portal</title>

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === CORE STYLES === */
        :root {
            --brand-red: #d30000;
            --brand-red-deep: #8b0000;
            --brand-dark: #120a0a; 
            --brand-light: #ffffff;
            --brand-sand: #FFFDD0; 
            --brand-sand-dark: #e6e4b8; 
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--brand-sand); 
            color: var(--brand-dark);
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; font-weight: 600; }
        .text-brand { color: var(--brand-red) !important; }
        .text-dim { color: var(--brand-dark); opacity: 0.65; }

        /* === SIDEBAR NAVIGATION === */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background-color: var(--brand-light);
            box-shadow: 2px 0 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 1.5rem;
            border-bottom: 1px solid var(--brand-sand-dark);
            text-align: center;
        }

        .sidebar-nav {
            padding: 1.5rem 0;
            flex-grow: 1;
        }

        .nav-item-staff {
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--brand-dark);
            opacity: 0.8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .nav-item-staff:hover, .nav-item-staff.active {
            background-color: var(--brand-sand);
            color: var(--brand-red);
            opacity: 1;
            border-left-color: var(--brand-red);
            font-weight: 600;
        }

        .nav-item-staff i { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--brand-sand-dark);
        }

        /* === MAIN CONTENT AREA === */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background-color: var(--brand-light);
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--brand-light);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px; 
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--brand-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 2px solid var(--brand-sand-dark);
        }

        /* === UI CARDS === */
        .ui-card {
            background-color: var(--brand-light);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--brand-light);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--brand-sand-dark);
            color: var(--brand-dark);
        }

        /* Profile Picture UI */
        .photo-upload-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: #fafafa;
            border-radius: 10px;
            border: 1px dashed var(--brand-sand-dark);
        }

        .current-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--brand-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            border: 3px solid var(--brand-light);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Form Styling */
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            color: var(--brand-dark);
            opacity: 0.9;
        }

        .form-control {
            width: 100%;
            border: 1px solid var(--brand-sand-dark);
            background-color: #fafafa;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s;
            color: var(--brand-dark);
            font-weight: 500;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-red);
            box-shadow: 0 0 0 2px rgba(211, 0, 0, 0.1);
            background-color: var(--brand-light);
        }

        .btn-primary-action {
            background-color: var(--brand-red);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-primary-action:hover { background-color: var(--brand-red-deep); color: white; }

        .btn-secondary-action {
            background-color: var(--brand-light);
            color: var(--brand-dark);
            border: 1px solid var(--brand-sand-dark);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-secondary-action:hover { border-color: var(--brand-red); color: var(--brand-red); background-color: var(--brand-sand); }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1rem; }
            .photo-upload-container { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <a href="index.html">
                <img src="../logo.png" alt="Consumer Links" height="40">
            </a>
        </div>
        <div class="sidebar-nav">
            <a href="staff-profile.html" class="nav-item-staff">
                <i class="fa-solid fa-user"></i> My Profile
            </a>
            <a href="staff-mails.html" class="nav-item-staff">
                <i class="fa-solid fa-envelope"></i> Mails
            </a>
            <a href="staff-settings.html" class="nav-item-staff active">
                <i class="fa-solid fa-user-pen"></i> Settings
            </a>
        </div>
        <div class="sidebar-footer">
            <a href="login.html" class="nav-item-staff text-brand" style="padding: 0; opacity: 1;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Secure Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        
        <!-- Topbar -->
        <header class="topbar">
            <div>
                <h4 class="font-serif fw-bold mb-0">Account Settings</h4>
                <p class="text-dim mb-0" style="font-size: 0.85rem;">Update your profile and security details.</p>
            </div>
            
            <div class="user-profile">
                <div class="text-end">
                    <p class="mb-0 fw-bold" style="font-size: 0.95rem; color: var(--brand-dark); line-height: 1.2;">Eleojo Arawa</p>
                    <p class="mb-0" style="font-size: 0.8rem; color: var(--brand-red-deep); opacity: 0.8;">eleojo@example.com</p>
                </div>
                <div class="avatar-circle">EA</div>
            </div>
        </header>

        <div class="row g-4">
            
            <!-- LEFT COLUMN: Edit Profile -->
            <div class="col-lg-7">
                <div class="ui-card">
                    <h2 class="card-title">Edit Profile Information</h2>

                    <!-- Profile Photo Section -->
                    <div class="photo-upload-container">
                        <div class="current-photo">EA</div>
                        <div>
                            <h6 class="fw-bold mb-1">Profile Picture</h6>
                            <p class="text-dim mb-3" style="font-size: 0.85rem;">JPG or PNG, max 2MB.</p>
                            <div class="d-flex gap-2">
                                <label class="btn-secondary-action py-2 px-3" style="cursor: pointer;">
                                    <i class="fa-solid fa-upload"></i> Upload Photo
                                    <input type="file" hidden>
                                </label>
                                <button class="btn-micro" style="height: 40px; width: 40px;" title="Remove Photo">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" value="+234 803 123 4567">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Residential Address</label>
                            <input type="text" class="form-control" value="12, Example Crescent, Lekki, Lagos">
                        </div>
                        <button type="button" class="btn-primary-action">Save Changes</button>
                    </form>
                </div>
            </div>

            <!-- RIGHT COLUMN: Security -->
            <div class="col-lg-5">
                <div class="ui-card">
                    <h2 class="card-title">Change Password</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" placeholder="Enter new password">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" placeholder="Confirm new password">
                        </div>
                        <button type="button" class="btn-secondary-action w-100 justify-content-center">Update Password</button>
                    </form>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
