<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Consumer Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="brand-text h3 mb-1">Consumer Links</h2>
                <p class="text-muted small">Reset your account password</p>
            </div>

            <form action="forgot-password.html" method="POST">
                <p class="small text-muted mb-4">Enter the email address associated with your account, and we'll send
                    you a link to reset your password.</p>

                <div class="mb-4">
                    <label for="email" class="form-label small fw-medium">Work Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@consumerlinks.com" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Send Reset Link</button>
            </form>

            <div class="text-center">
                <a href="index.html" class="small text-decoration-none fw-medium text-muted">&larr; Back to Login</a>
            </div>
        </div>
    </div>

</body>

</html>
