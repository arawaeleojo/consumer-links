<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Consumer Links Ltd</title>

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --brand-red: #d30000;
            --brand-red-deep: #8b0000;
            --brand-dark: #120a0a;
            --brand-light: #ffffff;
            --brand-cream: #faebd7;
            --brand-sand: #FFFDD0;
            --brand-sand-dark: #e6e4b8;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--brand-cream);
            color: var(--brand-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Subtle Static Background Grid for Brand Continuity */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(211, 0, 0, 0.04) 2px, transparent 2px),
                linear-gradient(90deg, rgba(211, 0, 0, 0.04) 2px, transparent 2px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .text-brand {
            color: var(--brand-red) !important;
        }

        /* === GLOBAL NAVBAR (Set to solid/scrolled state by default for the login page) === */
        .navbar-custom {
            padding: 1rem 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            z-index: 1030;
        }

        .navbar-custom .nav-link {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--brand-dark) !important;
            margin: 0 1rem;
            transition: color 0.3s;
            position: relative;
        }

        .navbar-custom .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: var(--brand-red);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .navbar-custom .nav-link:hover::after,
        .navbar-custom .nav-link.active::after {
            width: 100%;
        }

        .navbar-custom .nav-link:hover {
            color: var(--brand-red) !important;
        }

        .nav-btn-outline {
            border: 2px solid var(--brand-red);
            color: var(--brand-red);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-btn-outline:hover {
            background: var(--brand-red);
            color: #ffffff;
        }

        /* === CENTERED AUTH LAYOUT === */
        .auth-wrapper {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 2rem 2rem 2rem;
            /* Added top padding to clear the fixed navbar */
            position: relative;
            z-index: 2;
        }

        .auth-card {
            background-color: var(--brand-light);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--brand-sand-dark);
        }

        .brand-text {
            color: var(--brand-dark);
        }

        /* Form Styling */
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
            display: block;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.8rem 1rem;
            border: 1px solid var(--brand-sand-dark);
            background-color: #fafafa;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--brand-red);
            box-shadow: 0 0 0 0.25rem rgba(211, 0, 0, 0.1);
            background-color: #fff;
        }

        /* Action Buttons */
        .btn-primary {
            background: var(--brand-red);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: var(--brand-red-deep);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 0, 0, 0.2);
            color: #fff;
        }

        .register-link {
            color: var(--brand-red);
            transition: color 0.3s;
        }

        .register-link:hover {
            color: var(--brand-red-deep);
            text-decoration: underline !important;
        }

        .forgot-link {
            font-size: 0.85rem;
            color: var(--brand-red);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--brand-red-deep);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Integrated Navigation -->
    <nav id="mainNav" class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container">
            <!-- Logo with White Pill Background -->
            <a class="navbar-brand bg-white rounded px-2 py-1" href="index.html">
                <img src="logo.png" alt="Consumer Links Ltd Logo" height="45">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon" style="filter: invert(0);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
                        <a href="login.html" class="nav-btn-outline"
                            style="background: var(--brand-red); color: white;">Employee Portal</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Centered Auth Layout -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="text-center mb-4">
                <h2 class="font-serif brand-text h3 mb-1">Employee Portal</h2>
                <p class="text-muted small" style="font-size: 0.9rem;">Please enter your credentials to login.</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@consumerlinksltd.com"
                        required>
                </div>

                <div class="mb-2 text-start">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>

                <!-- Relocated Forgot Password -->
                <div class="mb-4 text-start">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-4">Sign In</button>
            </form>

            <div class="text-center pt-3 border-top" style="border-color: var(--brand-sand-dark) !important;">
                <span class="small text-muted" style="font-size: 0.9rem;">
                    An employee but no account yet? <br>
                    <a href="register.html"
                        class="text-decoration-none fw-bold register-link mt-1 d-inline-block">Register here</a>
                </span>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
