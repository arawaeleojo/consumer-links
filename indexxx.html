<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Consumer Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="brand-text h3 mb-1">Consumer Links</h2>
                <p class="text-muted small">Employee Portal Login</p>
            </div>

            <form action="dashboard.html" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-medium">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@consumerlinks.com" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label small fw-medium">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
            </form>

            <div class="text-center">
                <span class="small text-muted">Don't have an account? <a href="register.html"
                        class="text-decoration-none fw-medium">Register here</a></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
