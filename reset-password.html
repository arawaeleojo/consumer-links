<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | Consumer Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="brand-text h3 mb-1">Consumer Links</h2>
                <p class="text-muted small">Create a new password</p>
            </div>

            <form action="index.html" method="POST">
                <input type="hidden" name="token" value="example_token_here">

                <div class="mb-3">
                    <label for="newPassword" class="form-label small fw-medium">New Password</label>
                    <input type="password" class="form-control" id="newPassword" placeholder="Enter new password"
                        required>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label small fw-medium">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword"
                        placeholder="Confirm your new password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Update Password</button>
            </form>
        </div>
    </div>

</body>

</html>
