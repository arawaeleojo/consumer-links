<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Consumer Links</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-card" style="max-width: 550px;">
            <div class="text-center mb-4">
                <h2 class="brand-text h3 mb-1">Consumer Links</h2>
                <p class="text-muted small">Create your employee profile</p>
            </div>

            <form action="index.html" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label small fw-medium">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label small fw-medium">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label small fw-medium">Work Email</label>
                    <input type="email" class="form-control" id="email" placeholder="name@consumerlinks.com" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label small fw-medium">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+1 234 567 8900" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="password" class="form-label small fw-medium">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="confirmPassword" class="form-label small fw-medium">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Complete Registration</button>
            </form>

            <div class="text-center">
                <span class="small text-muted">Already registered? <a href="index.html"
                        class="text-decoration-none fw-medium">Sign in here</a></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
